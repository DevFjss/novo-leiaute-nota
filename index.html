<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota Técnica CDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>

<style>
body { font-family: Arial; background:#f1f5f9; margin:0; }

.header {
    background:#0a2647; color:#fff;
    padding:15px; font-size:18px;
}

.main { padding:20px; }

.card {
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.cards {
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

.card-box {
    flex:1;
    min-width:200px;
}

.valor {
    font-size:20px;
    font-weight:bold;
}

.btn { padding:10px; border:none; cursor:pointer; border-radius:8px; }
.btn-blue { background:#2f80ed; color:#fff; }
.btn-green { background:#10b981; color:#fff; }
.btn-red { background:#ef4444; color:#fff; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td,th {
    border:1px solid #ccc;
    padding:6px;
    font-size:12px;
}

.valor-monetario { text-align:right; }

</style>
</head>

<body>

<div class="header">
    Nota Técnica CDF
</div>

<div class="main">

<!-- 🔷 CARDS -->
<div class="cards">

    <div class="card card-box">
        <div>FAED MANUTENÇÃO</div>
        <div id="totalFaed" class="valor">R$ 0,00</div>
    </div>

    <div class="card card-box">
        <div>ALIMENTAÇÃO</div>
        <div id="totalAlimentacao" class="valor">R$ 0,00</div>
    </div>

    <div class="card card-box">
        <div>TOTAL GERAL</div>
        <div id="totalGeral" class="valor">R$ 0,00</div>
    </div>

</div>

<!-- 🔘 BOTÕES -->
<div style="margin-bottom:10px;">
    <button class="btn btn-blue" onclick="buscarFAED()">Buscar FAED</button>
    <button class="btn btn-green" onclick="buscarAlimentacao()">Buscar Alimentação</button>
    <button class="btn btn-red" onclick="limpar()">Limpar</button>
</div>

<!-- 📊 TABELA -->
<div class="card">
    <table id="tabela">
        <thead>
            <tr>
                <th>Escola</th>
                <th>FAED 2023</th>
                <th>FAED 2024</th>
                <th>Alim 2023</th>
                <th>Alim 2024</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

</div>

<script>

// 🔢 DADOS MOCK (simulação)
let escolasSelecionadas = [
    { codigoSec:"1", nome:"Escola A" },
    { codigoSec:"2", nome:"Escola B" }
];

let valoresFAED = { 2023:{}, 2024:{} };
let valoresAlimentacao = { 2023:{federal:{}, estadual:{}}, 2024:{federal:{}, estadual:{}} };

// 💰 FORMATAR
function formatarValorBR(valor){
    return valor.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

// 📊 RENDER TABELA
function renderTabela(){
    let html = "";

    escolasSelecionadas.forEach(e => {
        html += `<tr>
            <td>${e.nome}</td>
            <td class="valor-monetario">${formatarValorBR(valoresFAED[2023][e.codigoSec]||0)}</td>
            <td class="valor-monetario">${formatarValorBR(valoresFAED[2024][e.codigoSec]||0)}</td>
            <td class="valor-monetario">${formatarValorBR(
                (valoresAlimentacao[2023].federal[e.codigoSec]||0) +
                (valoresAlimentacao[2023].estadual[e.codigoSec]||0)
            )}</td>
            <td class="valor-monetario">${formatarValorBR(
                (valoresAlimentacao[2024].federal[e.codigoSec]||0) +
                (valoresAlimentacao[2024].estadual[e.codigoSec]||0)
            )}</td>
        </tr>`;
    });

    document.querySelector("#tabela tbody").innerHTML = html;
}

// 🧠 ATUALIZAR CARDS
function atualizarCards(){
    let totalFaed = 0;
    let totalAlim = 0;

    escolasSelecionadas.forEach(e=>{
        for(let ano of [2023,2024]){
            totalFaed += valoresFAED[ano][e.codigoSec]||0;

            totalAlim += (valoresAlimentacao[ano].federal[e.codigoSec]||0);
            totalAlim += (valoresAlimentacao[ano].estadual[e.codigoSec]||0);
        }
    });

    document.getElementById("totalFaed").innerText = "R$ "+formatarValorBR(totalFaed);
    document.getElementById("totalAlimentacao").innerText = "R$ "+formatarValorBR(totalAlim);
    document.getElementById("totalGeral").innerText = "R$ "+formatarValorBR(totalFaed+totalAlim);
}

// 🔵 SIMULA BUSCA FAED
function buscarFAED(){
    valoresFAED[2023] = { "1":1000, "2":2000 };
    valoresFAED[2024] = { "1":1500, "2":2500 };

    renderTabela();
    atualizarCards();
}

// 🟢 SIMULA ALIMENTAÇÃO
function buscarAlimentacao(){
    valoresAlimentacao[2023].federal = { "1":500, "2":700 };
    valoresAlimentacao[2023].estadual = { "1":300, "2":400 };

    valoresAlimentacao[2024].federal = { "1":600, "2":800 };
    valoresAlimentacao[2024].estadual = { "1":350, "2":450 };

    renderTabela();
    atualizarCards();
}

// 🔴 LIMPAR
function limpar(){
    valoresFAED = { 2023:{}, 2024:{} };
    valoresAlimentacao = { 2023:{federal:{}, estadual:{}}, 2024:{federal:{}, estadual:{}} };

    renderTabela();
    atualizarCards();
}

// INIT
renderTabela();

</script>

</body>
</html>
